# =============================================================================
# BITCOIN KNOTS NODE CONFIGURATION
# =============================================================================

# -----------------------------------------------------------------------------
# CORE SERVER SETTINGS

# Custom node name
uacomment=shift-happens

# Custom node name

# Custom node name

# Custom node name
# -----------------------------------------------------------------------------
# Enable RPC server
server=1

# Enable listening for incoming connections (allows other nodes to connect)
listen=1

# -----------------------------------------------------------------------------
# INDEXING & DATA STORAGE
# -----------------------------------------------------------------------------
# Enable transaction index for full transaction lookups
txindex=1

# Enable address index for address-based queries
addrindex=1

# Enable timestamp index for time-based queries
timestampindex=1

# Enable spent index for UTXO tracking
spentindex=1

# Enable block filter index
blockfilterindex=1

# Pruning configuration - keep blocks from January 2022 onwards (block ~717,568)
# This saves disk space while preserving your transaction history
#prune=200000

# -----------------------------------------------------------------------------
# RPC AUTHENTICATION & SECURITY
# -----------------------------------------------------------------------------
# RPC authentication - using cookie authentication (more secure)
# Bitcoin Core will automatically generate a cookie file in the data directory

# RPC binding and access control
[main]
rpcbind=127.0.0.1
rpcbind=192.168.1.6 # WiFi
#rpcbind=192.168.1.21 # LAN
rpcallowip=127.0.0.1
rpcallowip=192.168.1.0/16

# -----------------------------------------------------------------------------
# RPC PERFORMANCE & COMPATIBILITY
# -----------------------------------------------------------------------------
# Additional settings for better compatibility
rpcserialversion=1
rpcthreads=4
rpcmaxconnections=10

# Increase RPC timeout for large queries
rpctimeout=30

# Enable RPC calls for wallet functionality
rpcwallet=1

# -----------------------------------------------------------------------------
# ZMQ NOTIFICATIONS (ZeroMQ)
# -----------------------------------------------------------------------------
# Enable real-time block and transaction notifications via ZeroMQ
# This allows external applications to receive instant notifications
zmqpubhashblock=tcp://127.0.0.1:28332
zmqpubhashtx=tcp://127.0.0.1:28333
zmqpubrawblock=tcp://127.0.0.1:28334
zmqpubrawtx=tcp://127.0.0.1:28335

# -----------------------------------------------------------------------------
# TOR NETWORK CONFIGURATION
# -----------------------------------------------------------------------------
# Enable Tor proxy for outbound connections to .onion addresses
#proxy=127.0.0.1:9050

# Allow connections from Tor (bind to localhost for hidden service)
bind=127.0.0.1

# Also bind to your local network (existing functionality)
bind=192.168.1.6

# Discover own .onion address and announce to peers
listenonion=1

# Allow DNS lookups through Tor
onlynet=ipv4
onlynet=ipv6
onlynet=onion